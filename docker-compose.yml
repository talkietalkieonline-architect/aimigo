version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aimigo
      POSTGRES_PASSWORD: aimigo
      POSTGRES_DB: aimigo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimigo"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://aimigo:aimigo@postgres:5432/aimigo"
      DATABASE_URL_SYNC: "postgresql://aimigo:aimigo@postgres:5432/aimigo"
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
