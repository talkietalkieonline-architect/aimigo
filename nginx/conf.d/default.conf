# ── HTTP → HTTPS redirect + Let's Encrypt ──
server {
    listen 80;
    server_name aimigo.ru www.aimigo.ru;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — основной сервер ──
server {
    listen 443 ssl;
    http2 on;
    server_name aimigo.ru www.aimigo.ru;

    # SSL сертификаты (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/aimigo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aimigo.ru/privkey.pem;

    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Backend API ──
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для LLM-ответов (могут быть долгими)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket ──
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket keep-alive (LLM-ответы могут быть долгими)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Frontend (Next.js) ──
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js static assets ──
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Favicon, public files
    location /favicon.ico {
        proxy_pass http://frontend;
        proxy_cache_valid 200 7d;
    }
}
